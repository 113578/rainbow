name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.12"

      - name: Install dependencies
        run: uv sync --all-groups --all-extras --all-packages

      - name: Run prek
        run: uv run prek run --all-files
